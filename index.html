<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zvířecí třídírna</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}
.shake { animation: shake 0.3s; }
</style>
</head>

<body class="bg-sky-100 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

<div class="bg-white p-8 rounded-3xl shadow-xl max-w-xl w-full text-center">
  <h1 class="text-4xl font-bold text-sky-700 mb-6">🐾 Zvířecí třídírna</h1>

  <div id="card" class="bg-white border-4 border-gray-800 rounded-2xl p-8 mb-6">
    <div id="emoji" class="text-7xl mb-4">🐟</div>
    <div id="animalName" class="text-3xl font-bold">kapr</div>
  </div>

  <div id="feedback" class="h-8 mb-4 font-bold"></div>

  <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
    <button onclick="check('ryby')" class="bg-blue-400 text-white p-3 rounded-xl">RYBY</button>
    <button onclick="check('obojzivelnici')" class="bg-green-500 text-white p-3 rounded-xl">OBOJŽIVELNÍCI</button>
    <button onclick="check('plazi')" class="bg-orange-400 text-white p-3 rounded-xl">PLAZI</button>
    <button onclick="check('ptaci')" class="bg-yellow-400 text-white p-3 rounded-xl">PTÁCI</button>
    <button onclick="check('savci')" class="bg-purple-400 text-white p-3 rounded-xl col-span-2 md:col-span-1">SAVCI</button>
  </div>
</div>

<script>
const animals = [
  {name:"kapr", type:"ryby", emoji:"🐟"},
  {name:"skokan", type:"obojzivelnici", emoji:"🐸"},
  {name:"ještěrka", type:"plazi", emoji:"🦎"},
  {name:"kos", type:"ptaci", emoji:"🐦"},
  {name:"pes", type:"savci", emoji:"🐕"},
  {name:"želva", type:"plazi", emoji:"🐢"},
  {name:"kachna", type:"ptaci", emoji:"🦆"},
  {name:"ježek", type:"savci", emoji:"🦔"}
];

let index = 0;

function showAnimal() {
  document.getElementById("animalName").textContent = animals[index].name;
  document.getElementById("emoji").textContent = animals[index].emoji;
  document.getElementById("feedback").textContent = "";
}

function check(selected) {
  const correct = animals[index].type;
  const feedback = document.getElementById("feedback");
  const card = document.getElementById("card");

  if (selected === correct) {
    feedback.textContent = "✅ Správně!";
    feedback.className = "text-green-600 font-bold";
    index++;

    if (index >= animals.length) {
      setTimeout(() => {
        alert("🎉 Hotovo! Prošli jste všechna zvířata!");
        index = 0;
        showAnimal();
      }, 500);
    } else {
      setTimeout(showAnimal, 500);
    }
  } else {
    feedback.textContent = "❌ Zkus to znovu.";
    feedback.className = "text-red-600 font-bold";
    card.classList.add("shake");
    setTimeout(() => card.classList.remove("shake"), 300);
  }
}

showAnimal();
</script>

</body>
</html>
